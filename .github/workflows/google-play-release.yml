name: Google Play Release

on:
  workflow_dispatch:
    inputs:
      track:
        description: Google Play release track
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal
        required: true
      status:
        description: Google Play release status
        type: choice
        options:
          - draft
          - completed
          - inProgress
          - halted
        default: draft
        required: true
      release_name:
        description: Play Console release name
        type: string
        default: Ymir Android 1
        required: true
      publish_to_play:
        description: Upload the signed AAB to Google Play after building
        type: boolean
        default: false
        required: true
      changes_not_sent_for_review:
        description: Leave Play Console changes unsubmitted for review
        type: boolean
        default: false
        required: true

permissions:
  contents: read

env:
  ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/signing/play-release.jks
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
  IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
  IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}

jobs:
  play-release:
    name: Build and upload AAB
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build packages
        shell: bash
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;29.0.14206865" "cmake;3.22.1"

      - name: Decode release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/signing
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Build signed release bundle
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ymir-android-play-v1
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Publish to Google Play
        if: ${{ inputs.publish_to_play }}
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: io.github.strikerx3.ymir.android
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          tracks: ${{ inputs.track }}
          status: ${{ inputs.status }}
          releaseName: ${{ inputs.release_name }}
          changesNotSentForReview: ${{ inputs.changes_not_sent_for_review }}
